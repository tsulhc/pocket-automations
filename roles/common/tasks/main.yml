---
- name: Validate supported operating system
  ansible.builtin.assert:
    that:
      - ansible_distribution in common_supported_distributions
      - ansible_distribution_version in common_supported_ubuntu_versions
    fail_msg: >-
      This automation currently supports Ubuntu {{ common_supported_ubuntu_versions | join(', ') }}.
      Detected {{ ansible_distribution }} {{ ansible_distribution_version }}.
    success_msg: "Supported Ubuntu release detected."

- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common base packages
  ansible.builtin.apt:
    name: "{{ common_base_packages }}"
    state: present

- name: Create shared service group
  ansible.builtin.group:
    name: "{{ common_service_group }}"
    system: true
    state: present

- name: Create service users
  ansible.builtin.user:
    name: "{{ item.name }}"
    group: "{{ common_service_group }}"
    home: "{{ item.home }}"
    shell: "{{ item.shell }}"
    system: true
    create_home: true
    state: present
  loop: "{{ common_service_users }}"

- name: Create standard directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
    state: directory
  loop: "{{ common_directories }}"

- name: Configure sysctl settings for relay workloads
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/90-pocket-automations.conf
    state: present
    reload: false
  loop: "{{ common_sysctl_settings | dict2items }}"
  notify: Reload sysctl

- name: Configure file descriptor limits
  community.general.pam_limits:
    domain: "{{ item.domain }}"
    limit_type: "{{ item.limit_type }}"
    limit_item: "{{ item.limit_item }}"
    value: "{{ item.value }}"
  loop: "{{ common_limits }}"
