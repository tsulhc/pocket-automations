---
- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Docker apt repository key
  ansible.builtin.get_url:
    url: "{{ docker_apt_key_url }}"
    dest: "{{ docker_apt_keyring_path }}"
    owner: root
    group: root
    mode: "0644"
    force: false

- name: Configure Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - "{{ docker_apt_uri }}"
    suites:
      - "{{ docker_apt_suite }}"
    components: "{{ docker_apt_components }}"
    architectures:
      - "{{ docker_apt_architecture }}"
    signed_by: "{{ docker_apt_keyring_path }}"
    state: present

- name: Update apt cache after Docker repository changes
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: "{{ docker_service_name }}"
    enabled: true
    state: started

- name: Add configured users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Validate Docker Engine is available
  ansible.builtin.command: docker version --format '{{ "{{" }}.Server.Version{{ "}}" }}'
  register: docker_version_check
  changed_when: false

- name: Validate Docker Compose plugin is available
  ansible.builtin.command: docker compose version
  register: docker_compose_check
  changed_when: false
