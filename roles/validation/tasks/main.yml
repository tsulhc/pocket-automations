---
- name: Skip validation when disabled
  ansible.builtin.meta: end_host
  when: not validation_enabled | bool

- name: Initialize validation result lists
  ansible.builtin.set_fact:
    validation_pass: []
    validation_warn: []
    validation_fail: []
    validation_manual_steps: []

- name: Validate Ubuntu target
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Ubuntu ' ~ ansible_distribution_version ~ ' is supported.'] }}"
  when:
    - ansible_distribution == 'Ubuntu'
    - ansible_distribution_version in validation_supported_ubuntu_versions

- name: Record unsupported OS failure
  ansible.builtin.set_fact:
    validation_fail: "{{ validation_fail + ['Unsupported OS: ' ~ ansible_distribution ~ ' ' ~ ansible_distribution_version ~ '. Use Ubuntu 22.04 or 24.04.'] }}"
  when: ansible_distribution != 'Ubuntu' or ansible_distribution_version not in validation_supported_ubuntu_versions

- name: Check Docker service status
  ansible.builtin.command: systemctl is-active docker
  changed_when: false
  failed_when: false
  register: validation_docker_status
  when: validation_docker_enabled | bool

- name: Record Docker service result
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Docker service is active.'] if validation_docker_status.rc == 0 else validation_pass }}"
    validation_fail: "{{ validation_fail + ['Docker service is not active. Run playbooks/site.yml or inspect systemctl status docker.'] if validation_docker_status.rc != 0 else validation_fail }}"
  when: validation_docker_enabled | bool

- name: Check Docker Compose plugin
  ansible.builtin.command: docker compose version
  changed_when: false
  failed_when: false
  register: validation_compose_status
  when: validation_docker_enabled | bool

- name: Record Docker Compose result
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Docker Compose plugin is available.'] if validation_compose_status.rc == 0 else validation_pass }}"
    validation_fail: "{{ validation_fail + ['Docker Compose plugin is missing or not executable. Re-run the docker role.'] if validation_compose_status.rc != 0 else validation_fail }}"
  when: validation_docker_enabled | bool

- name: Check Pocket RPC endpoint
  ansible.builtin.uri:
    url: "{{ pocket_rpc_url }}"
    method: GET
    status_code: "{{ validation_pocket_rpc_status_code }}"
    timeout: "{{ validation_timeout }}"
  register: validation_pocket_rpc_check
  retries: "{{ validation_retries }}"
  delay: "{{ validation_delay }}"
  until: validation_pocket_rpc_check.status is defined and validation_pocket_rpc_check.status in validation_pocket_rpc_status_code
  failed_when: false
  when:
    - validation_pocket_rpc_enabled | bool
    - pocket_rpc_url is defined

- name: Record Pocket RPC result
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Pocket RPC endpoint is reachable: ' ~ pocket_rpc_url] if validation_pocket_rpc_check.status is defined and validation_pocket_rpc_check.status in validation_pocket_rpc_status_code else validation_pass }}"
    validation_fail: "{{ validation_fail + ['Pocket RPC endpoint is not reachable: ' ~ pocket_rpc_url] if validation_pocket_rpc_check.status is not defined or validation_pocket_rpc_check.status not in validation_pocket_rpc_status_code else validation_fail }}"
  when:
    - validation_pocket_rpc_enabled | bool
    - pocket_rpc_url is defined

- name: Check Pocket gRPC TCP endpoint
  ansible.builtin.wait_for:
    host: "{{ pocket_grpc_address.split(':')[0] }}"
    port: "{{ pocket_grpc_address.split(':')[1] | default(443) }}"
    timeout: "{{ validation_timeout }}"
  register: validation_pocket_grpc_check
  failed_when: false
  when:
    - validation_pocket_grpc_enabled | bool
    - pocket_grpc_address is defined

- name: Record Pocket gRPC result
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Pocket gRPC endpoint is reachable: ' ~ pocket_grpc_address] if validation_pocket_grpc_check.failed is defined and not validation_pocket_grpc_check.failed else validation_pass }}"
    validation_fail: "{{ validation_fail + ['Pocket gRPC endpoint is not reachable: ' ~ pocket_grpc_address] if validation_pocket_grpc_check.failed is not defined or validation_pocket_grpc_check.failed else validation_fail }}"
  when:
    - validation_pocket_grpc_enabled | bool
    - pocket_grpc_address is defined

- name: Validate known network chain mapping
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Pocket network and chain ID mapping is coherent.'] if (pocket_network | default('')) != 'beta' or pocket_chain_id == 'pocket-lego-testnet' else validation_pass }}"
    validation_fail: "{{ validation_fail + ['For pocket_network=beta, pocket_chain_id must be pocket-lego-testnet.'] if (pocket_network | default('')) == 'beta' and pocket_chain_id != 'pocket-lego-testnet' else validation_fail }}"
  when: pocket_chain_id is defined

- name: Check Redis TCP connectivity
  ansible.builtin.wait_for:
    host: "{{ validation_redis_host }}"
    port: "{{ validation_redis_port | int }}"
    timeout: "{{ validation_timeout }}"
  register: validation_redis_check
  failed_when: false
  when: validation_redis_enabled | bool or validation_relayer_enabled | bool or validation_miner_enabled | bool

- name: Record Redis connectivity result
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Redis is reachable at ' ~ validation_redis_host ~ ':' ~ (validation_redis_port | string) ~ '.'] if validation_redis_check.failed is defined and not validation_redis_check.failed else validation_pass }}"
    validation_fail: "{{ validation_fail + ['Redis is not reachable at ' ~ validation_redis_host ~ ':' ~ (validation_redis_port | string) ~ '.'] if validation_redis_check.failed is not defined or validation_redis_check.failed else validation_fail }}"
  when: validation_redis_enabled | bool or validation_relayer_enabled | bool or validation_miner_enabled | bool

- name: Check Provider health endpoint
  ansible.builtin.uri:
    url: "{{ validation_provider_health_url }}"
    method: GET
    status_code: 200
    timeout: "{{ validation_timeout }}"
  register: validation_provider_health_check
  failed_when: false
  when: validation_provider_enabled | bool

- name: Check Provider bootstrap report exists
  ansible.builtin.stat:
    path: "{{ validation_provider_bootstrap_report_path }}"
  register: validation_provider_report_stat
  when: validation_provider_enabled | bool

- name: Record Provider validation result
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Igniter Provider health endpoint is reachable.'] if validation_provider_health_check.status is defined and validation_provider_health_check.status == 200 else validation_pass }}"
    validation_fail: "{{ validation_fail + ['Igniter Provider health endpoint is not reachable at ' ~ validation_provider_health_url ~ '.'] if validation_provider_health_check.status is not defined or validation_provider_health_check.status != 200 else validation_fail }}"
    validation_warn: "{{ validation_warn + ['Provider bootstrap report is missing. Deployment may not have completed or report path changed.'] if not (validation_provider_report_stat.stat.exists | default(false)) else validation_warn }}"
    validation_manual_steps: "{{ validation_manual_steps + ['Complete the Igniter Provider bootstrap wizard and supplier lifecycle workflows inside Provider.'] }}"
  when: validation_provider_enabled | bool

- name: Check Middleman health endpoint
  ansible.builtin.uri:
    url: "{{ validation_middleman_health_url }}"
    method: GET
    status_code: 200
    timeout: "{{ validation_timeout }}"
  register: validation_middleman_health_check
  failed_when: false
  when: validation_middleman_enabled | bool

- name: Check Middleman bootstrap report exists
  ansible.builtin.stat:
    path: "{{ validation_middleman_bootstrap_report_path }}"
  register: validation_middleman_report_stat
  when: validation_middleman_enabled | bool

- name: Record Middleman validation result
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['Igniter Middleman health endpoint is reachable.'] if validation_middleman_health_check.status is defined and validation_middleman_health_check.status == 200 else validation_pass }}"
    validation_fail: "{{ validation_fail + ['Igniter Middleman health endpoint is not reachable at ' ~ validation_middleman_health_url ~ '.'] if validation_middleman_health_check.status is not defined or validation_middleman_health_check.status != 200 else validation_fail }}"
    validation_warn: >-
      {{ validation_warn
         + (['Middleman bootstrap report is missing. Deployment may not have completed or report path changed.'] if not (validation_middleman_report_stat.stat.exists | default(false)) else [])
         + (['CoinMarketCap API key is not configured; coin value display may be degraded.'] if igniter_middleman_coin_market_cap_api_key | default('') | length == 0 else []) }}
    validation_manual_steps: "{{ validation_manual_steps + ['Complete any remaining Igniter Middleman delegator-facing setup after Provider bootstrap is complete.'] }}"
  when: validation_middleman_enabled | bool

- name: Check HA RelayMiner relayer health endpoint
  ansible.builtin.uri:
    url: "{{ validation_relayer_health_url }}"
    method: GET
    status_code: 200
    timeout: "{{ validation_timeout }}"
  register: validation_relayer_health_check
  failed_when: false
  when: validation_relayer_enabled | bool

- name: Check HA RelayMiner relayer metrics endpoint
  ansible.builtin.uri:
    url: "{{ validation_relayer_metrics_url }}"
    method: GET
    status_code: 200
    timeout: "{{ validation_timeout }}"
  register: validation_relayer_metrics_check
  failed_when: false
  when: validation_relayer_enabled | bool

- name: Record HA RelayMiner relayer result
  ansible.builtin.set_fact:
    validation_pass: >-
      {{ validation_pass
         + (['HA RelayMiner relayer health endpoint is reachable.'] if validation_relayer_health_check.status is defined and validation_relayer_health_check.status == 200 else [])
         + (['HA RelayMiner relayer metrics endpoint is reachable.'] if validation_relayer_metrics_check.status is defined and validation_relayer_metrics_check.status == 200 else []) }}
    validation_fail: "{{ validation_fail + ['HA RelayMiner relayer health endpoint is not reachable at ' ~ validation_relayer_health_url ~ '.'] if validation_relayer_health_check.status is not defined or validation_relayer_health_check.status != 200 else validation_fail }}"
    validation_warn: "{{ validation_warn + ['HA RelayMiner relayer metrics endpoint is not reachable at ' ~ validation_relayer_metrics_url ~ '.'] if validation_relayer_metrics_check.status is not defined or validation_relayer_metrics_check.status != 200 else validation_warn }}"
  when: validation_relayer_enabled | bool

- name: Check HA RelayMiner miner metrics endpoint
  ansible.builtin.uri:
    url: "{{ validation_miner_metrics_url }}"
    method: GET
    status_code: 200
    timeout: "{{ validation_timeout }}"
  register: validation_miner_metrics_check
  failed_when: false
  when: validation_miner_enabled | bool

- name: Record HA RelayMiner miner result
  ansible.builtin.set_fact:
    validation_pass: "{{ validation_pass + ['HA RelayMiner miner metrics endpoint is reachable.'] if validation_miner_metrics_check.status is defined and validation_miner_metrics_check.status == 200 else validation_pass }}"
    validation_fail: "{{ validation_fail + ['HA RelayMiner miner metrics endpoint is not reachable at ' ~ validation_miner_metrics_url ~ '.'] if validation_miner_metrics_check.status is not defined or validation_miner_metrics_check.status != 200 else validation_fail }}"
  when: validation_miner_enabled | bool

- name: Check configured HTTP backend validations
  ansible.builtin.uri:
    url: "{{ item.url }}"
    method: "{{ item.method | default('GET') }}"
    status_code: "{{ item.status_code | default(200) }}"
    timeout: "{{ validation_timeout }}"
  register: validation_http_backend_checks
  failed_when: false
  loop: "{{ validation_backend_checks }}"
  when:
    - validation_relayer_enabled | bool
    - item.type | default('http') == 'http'

- name: Check configured TCP backend validations
  ansible.builtin.wait_for:
    host: "{{ item.host }}"
    port: "{{ item.port }}"
    timeout: "{{ validation_timeout }}"
  register: validation_tcp_backend_checks
  failed_when: false
  loop: "{{ validation_backend_checks }}"
  when:
    - validation_relayer_enabled | bool
    - item.type | default('http') == 'tcp'

- name: Record backend validation summary
  ansible.builtin.set_fact:
    validation_pass: >-
      {{ validation_pass
         + (['Configured backend checks passed.'] if validation_backend_checks | length > 0
              and ((((validation_http_backend_checks | default({})).results | default([])) | selectattr('failed', 'defined') | selectattr('failed') | list | length) == 0)
              and ((((validation_tcp_backend_checks | default({})).results | default([])) | selectattr('failed', 'defined') | selectattr('failed') | list | length) == 0)
            else []) }}
    validation_fail: >-
      {{ validation_fail
         + (['One or more configured backend checks failed. Review Ansible task output for backend details.'] if validation_backend_checks | length > 0
              and (((((validation_http_backend_checks | default({})).results | default([])) | selectattr('failed', 'defined') | selectattr('failed') | list | length) > 0)
                   or ((((validation_tcp_backend_checks | default({})).results | default([])) | selectattr('failed', 'defined') | selectattr('failed') | list | length) > 0))
            else []) }}
    validation_warn: "{{ validation_warn + ['No ha_relayminer_backend_checks configured; backend readiness is not independently verified.'] if validation_relayer_enabled | bool and validation_backend_checks | length == 0 else validation_warn }}"

- name: Check public relay reverse proxy endpoint
  ansible.builtin.uri:
    url: "{{ validation_reverse_proxy_relay_url }}"
    method: GET
    status_code:
      - 200
      - 400
      - 404
      - 405
    timeout: "{{ validation_timeout }}"
    validate_certs: true
  register: validation_reverse_proxy_relay_check
  failed_when: false
  when:
    - validation_reverse_proxy_enabled | bool
    - reverse_proxy_relay_enabled | default(true) | bool

- name: Check Provider public API allowlist blocks root path
  ansible.builtin.uri:
    url: "{{ validation_reverse_proxy_provider_api_url }}/"
    method: GET
    status_code: 403
    timeout: "{{ validation_timeout }}"
    validate_certs: true
  register: validation_provider_api_block_check
  failed_when: false
  when:
    - validation_reverse_proxy_enabled | bool
    - reverse_proxy_provider_public_api_enabled | default(false) | bool

- name: Check Provider public API allowlisted health path
  ansible.builtin.uri:
    url: "{{ validation_reverse_proxy_provider_api_url }}/api/health"
    method: GET
    status_code:
      - 200
      - 404
    timeout: "{{ validation_timeout }}"
    validate_certs: true
  register: validation_provider_api_health_check
  failed_when: false
  when:
    - validation_reverse_proxy_enabled | bool
    - reverse_proxy_provider_public_api_enabled | default(false) | bool

- name: Check public Middleman reverse proxy endpoint
  ansible.builtin.uri:
    url: "{{ validation_reverse_proxy_middleman_url }}"
    method: GET
    status_code:
      - 200
      - 404
    timeout: "{{ validation_timeout }}"
    validate_certs: true
  register: validation_reverse_proxy_middleman_check
  failed_when: false
  when:
    - validation_reverse_proxy_enabled | bool
    - reverse_proxy_middleman_enabled | default(false) | bool

- name: Record reverse proxy validation result
  ansible.builtin.set_fact:
    validation_pass: >-
      {{ validation_pass
         + (['Relay public reverse proxy endpoint responded.'] if validation_reverse_proxy_relay_check.status is defined and validation_reverse_proxy_relay_check.status in [200, 400, 404, 405] else [])
         + (['Provider public API root path is blocked by allowlist.'] if validation_provider_api_block_check.status is defined and validation_provider_api_block_check.status == 403 else [])
         + (['Middleman public reverse proxy endpoint responded.'] if validation_reverse_proxy_middleman_check.status is defined and validation_reverse_proxy_middleman_check.status in [200, 404] else [])
         + (['Provider admin UI is not publicly exposed by this inventory.'] if not reverse_proxy_provider_admin_enabled | default(false) | bool else []) }}
    validation_fail: >-
      {{ validation_fail
         + (['Relay public reverse proxy endpoint did not respond as expected.'] if reverse_proxy_relay_enabled | default(true) | bool and (validation_reverse_proxy_relay_check.status is not defined or validation_reverse_proxy_relay_check.status not in [200, 400, 404, 405]) else [])
         + (['Provider public API root path is not blocked with 403. Check reverse proxy allowlist.'] if reverse_proxy_provider_public_api_enabled | default(false) | bool and (validation_provider_api_block_check.status is not defined or validation_provider_api_block_check.status != 403) else [])
         + (['Middleman public reverse proxy endpoint did not respond as expected.'] if reverse_proxy_middleman_enabled | default(false) | bool and (validation_reverse_proxy_middleman_check.status is not defined or validation_reverse_proxy_middleman_check.status not in [200, 404]) else []) }}
    validation_warn: "{{ validation_warn + ['Provider admin UI public routing is enabled. Ensure this is restricted by VPN, firewall, or IP allowlisting.'] if reverse_proxy_provider_admin_enabled | default(false) | bool else validation_warn }}"
  when: validation_reverse_proxy_enabled | bool

- name: Add infrastructure/manual boundary reminder
  ansible.builtin.set_fact:
    validation_manual_steps: "{{ validation_manual_steps + ['Ansible validates infrastructure only. Supplier staking, updates, unstaking, and reconciliation remain Igniter workflows.'] }}"

- name: Ensure validation report directory exists
  ansible.builtin.file:
    path: "{{ validation_report_path | dirname }}"
    state: directory
    owner: root
    group: pocket
    mode: "0750"

- name: Write validation report
  ansible.builtin.template:
    src: validation-report.md.j2
    dest: "{{ validation_report_path }}"
    owner: root
    group: pocket
    mode: "0640"

- name: Fail validation when critical failures were found
  ansible.builtin.fail:
    msg: "Validation found {{ validation_fail | length }} failure(s). See {{ validation_report_path }} on {{ inventory_hostname }}."
  when: validation_fail | length > 0
