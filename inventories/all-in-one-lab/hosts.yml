---
all:
  vars:
    ansible_user: ubuntu
    pocket_network: beta
    pocket_chain_id: pocket-lego-testnet
    pocket_rpc_url: https://sauron-rpc.beta.infra.pocket.network
    pocket_grpc_address: sauron-grpc.beta.infra.pocket.network:443

    igniter_provider_enabled: true
    igniter_middleman_enabled: false
    ha_relayminer_enabled: true

    provider_domain: provider.example.com
    provider_public_api_domain: provider-api.example.com
    middleman_domain: staking.example.com
    relay_public_domain: relayer.example.com

    reverse_proxy_engine: caddy
    reverse_proxy_tls_email: ops@example.com
    reverse_proxy_relay_enabled: true
    reverse_proxy_relay_backends:
      - http://127.0.0.1:8080
    reverse_proxy_provider_admin_enabled: false
    reverse_proxy_provider_public_api_enabled: false
    reverse_proxy_middleman_enabled: false

    redis_deployment_mode: docker
    redis_bind_address: 127.0.0.1
    redis_port: 6379

    ha_relayminer_install_mode: docker_build
    ha_relayminer_network_mode: host
    ha_relayminer_redis_url: redis://127.0.0.1:6379
    ha_relayminer_keys_mode: keyring
    ha_relayminer_keyring_dir: /etc/pocket-automations/ha-relayminer/keys/keyring

    # Replace placeholders through Ansible Vault or an external secret manager.
    igniter_postgres_password: VAULT_OR_SECRET_MANAGER_VALUE
    igniter_provider_owner_identity: pokt1replacewithowneraddress
    igniter_provider_owner_email: ops@example.com
    igniter_provider_app_identity: VAULT_OR_SECRET_MANAGER_VALUE

    relay_services:
      - service_id: eth
        validation_mode: optimistic
        timeout_profile: fast
        public_url: https://relayer.example.com
        default_backend: jsonrpc
        backends:
          jsonrpc:
            load_balancing: round_robin
            urls:
              - http://127.0.0.1:8545

  children:
    provider_hosts:
      hosts:
        pocket-all-in-one:
          ansible_host: 192.0.2.10
    middleman_hosts:
      hosts: {}
    postgres_hosts:
      hosts:
        pocket-all-in-one:
    temporal_hosts:
      hosts:
        pocket-all-in-one:
    redis_hosts:
      hosts:
        pocket-all-in-one:
    relay_relayers:
      hosts:
        pocket-all-in-one:
    relay_miners:
      hosts:
        pocket-all-in-one:
    reverse_proxy_hosts:
      hosts:
        pocket-all-in-one:
    pocket_cli_hosts:
      hosts:
        pocket-all-in-one:
