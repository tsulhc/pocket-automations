---
all:
  vars:
    ansible_user: ubuntu
    pocket_network: beta
    pocket_chain_id: pocket-lego-testnet
    pocket_rpc_url: https://sauron-rpc.beta.infra.pocket.network
    pocket_grpc_address: sauron-grpc.beta.infra.pocket.network:443

    igniter_provider_enabled: true
    igniter_middleman_enabled: false
    ha_relayminer_enabled: true

    provider_domain: provider.example.com
    provider_public_api_domain: provider-api.example.com
    middleman_domain: staking.example.com
    relay_public_domain: relayer.example.com

    redis_deployment_mode: docker
    redis_bind_address: 127.0.0.1
    redis_port: 6379

    # Replace placeholders through Ansible Vault or an external secret manager.
    igniter_provider_owner_identity: pokt1replacewithowneraddress
    igniter_provider_owner_email: ops@example.com
    igniter_provider_app_identity: VAULT_OR_SECRET_MANAGER_VALUE

    relay_services:
      - service_id: eth
        public_url: https://relayer.example.com
        default_backend: jsonrpc
        backends:
          jsonrpc:
            urls:
              - http://127.0.0.1:8545

  children:
    provider_hosts:
      hosts:
        pocket-all-in-one:
          ansible_host: 192.0.2.10
    middleman_hosts:
      hosts: {}
    postgres_hosts:
      hosts:
        pocket-all-in-one:
    temporal_hosts:
      hosts:
        pocket-all-in-one:
    redis_hosts:
      hosts:
        pocket-all-in-one:
    relay_relayers:
      hosts:
        pocket-all-in-one:
    relay_miners:
      hosts:
        pocket-all-in-one:
    reverse_proxy_hosts:
      hosts:
        pocket-all-in-one:
    pocket_cli_hosts:
      hosts:
        pocket-all-in-one:
