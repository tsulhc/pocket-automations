---
all:
  vars:
    ansible_user: ubuntu
    pocket_network: main
    pocket_chain_id: pocket
    pocket_rpc_url: https://sauron-rpc.infra.pocket.network
    pocket_grpc_address: sauron-grpc.infra.pocket.network:443

    igniter_provider_enabled: true
    igniter_middleman_enabled: false
    ha_relayminer_enabled: true

    provider_domain: provider.example.com
    provider_public_api_domain: provider-api.example.com
    relay_public_domain: relayer.example.com

    reverse_proxy_engine: caddy
    reverse_proxy_tls_email: ops@example.com
    reverse_proxy_relay_enabled: true
    reverse_proxy_relay_backends:
      - http://127.0.0.1:8080
    reverse_proxy_provider_admin_enabled: false
    reverse_proxy_provider_public_api_enabled: false
    reverse_proxy_middleman_enabled: false
    reverse_proxy_grafana_enabled: false

    monitoring_enabled: true
    monitoring_grafana_admin_password: VAULT_OR_SECRET_MANAGER_VALUE
    monitoring_grafana_public_enabled: false
    monitoring_grafana_domain: grafana.example.com
    monitoring_grafana_public_basic_auth_user: admin
    monitoring_grafana_public_basic_auth_hash: CADDY_BCRYPT_HASH_VALUE
    monitoring_scrape_jobs:
      - job_name: ha-relayminer-relayer
        targets:
          - 127.0.0.1:9090
      - job_name: ha-relayminer-miner
        targets:
          - 127.0.0.1:9092

    postgres_deployment_mode: docker
    temporal_deployment_mode: docker
    redis_deployment_mode: docker

    ha_relayminer_install_mode: docker_build
    ha_relayminer_network_mode: host
    ha_relayminer_redis_url: redis://127.0.0.1:6379

    # Miner reward readiness requires real supplier/operator keys at the configured source.
    # This inventory records key paths only; it does not create, import, or stake keys.
    ha_relayminer_keys_mode: keyring
    ha_relayminer_keyring_dir: /etc/pocket-automations/ha-relayminer/keys/keyring

    relay_services:
      - service_id: eth
        validation_mode: optimistic
        timeout_profile: fast
        public_url: https://relayer.example.com
        default_backend: jsonrpc
        backends:
          jsonrpc:
            load_balancing: round_robin
            urls:
              - https://eth-backend.example.internal

    # Replace placeholders through Ansible Vault or an external secret manager.
    igniter_postgres_password: VAULT_OR_SECRET_MANAGER_VALUE
    igniter_provider_owner_identity: pokt1replacewithowneraddress
    igniter_provider_owner_email: ops@example.com
    igniter_provider_app_identity: VAULT_OR_SECRET_MANAGER_VALUE

  children:
    provider_hosts:
      hosts:
        pocket-provider-01:
          ansible_host: 192.0.2.20
    middleman_hosts:
      hosts: {}
    postgres_hosts:
      hosts:
        pocket-provider-01:
    temporal_hosts:
      hosts:
        pocket-provider-01:
    redis_hosts:
      hosts:
        pocket-provider-01:
    relay_relayers:
      hosts:
        pocket-provider-01:
    relay_miners:
      hosts:
        pocket-provider-01:
    reverse_proxy_hosts:
      hosts:
        pocket-provider-01:
    monitoring_hosts:
      hosts:
        pocket-provider-01:
    pocket_cli_hosts:
      hosts:
        pocket-provider-01:
