---
all:
  vars:
    ansible_user: ubuntu
    pocket_network: main
    pocket_chain_id: pocket
    pocket_rpc_url: https://sauron-rpc.infra.pocket.network
    pocket_grpc_address: sauron-grpc.infra.pocket.network:443

    igniter_provider_enabled: true
    igniter_middleman_enabled: true
    ha_relayminer_enabled: true

    provider_domain: provider.internal.example.com
    provider_public_api_domain: provider-api.example.com
    middleman_domain: staking.example.com
    relay_public_domain: relayer.example.com

    reverse_proxy_engine: caddy
    reverse_proxy_tls_email: ops@example.com
    reverse_proxy_relay_enabled: true
    reverse_proxy_relay_backends:
      - http://192.0.2.40:8080
      - http://192.0.2.41:8080
    reverse_proxy_provider_admin_enabled: false
    reverse_proxy_provider_public_api_enabled: true
    reverse_proxy_provider_public_api_backend: http://192.0.2.30:3001
    reverse_proxy_middleman_enabled: true
    reverse_proxy_middleman_backend: http://192.0.2.31:3000

    postgres_deployment_mode: external
    temporal_deployment_mode: external
    redis_deployment_mode: external

    postgres_external_host: postgres.example.internal
    temporal_external_host: temporal.example.internal
    redis_url: redis://redis.example.internal:6379

    ha_relayminer_install_mode: docker_build
    ha_relayminer_network_mode: host
    ha_relayminer_redis_url: redis://redis.example.internal:6379
    ha_relayminer_keys_mode: keyring
    ha_relayminer_keyring_dir: /etc/pocket-automations/ha-relayminer/keys/keyring

    relay_services:
      - service_id: eth
        validation_mode: optimistic
        timeout_profile: fast
        public_url: https://relayer.example.com
        default_backend: jsonrpc
        backends:
          jsonrpc:
            load_balancing: round_robin
            urls:
              - https://eth-backend-01.example.internal
              - https://eth-backend-02.example.internal

    igniter_postgres_password: VAULT_OR_SECRET_MANAGER_VALUE
    igniter_provider_owner_identity: pokt1replacewithowneraddress
    igniter_provider_owner_email: ops@example.com
    igniter_provider_app_identity: VAULT_OR_SECRET_MANAGER_VALUE

  children:
    provider_hosts:
      hosts:
        provider-01:
          ansible_host: 192.0.2.30
    middleman_hosts:
      hosts:
        middleman-01:
          ansible_host: 192.0.2.31
    relay_relayers:
      hosts:
        relayer-01:
          ansible_host: 192.0.2.40
        relayer-02:
          ansible_host: 192.0.2.41
    relay_miners:
      hosts:
        miner-01:
          ansible_host: 192.0.2.50
        miner-02:
          ansible_host: 192.0.2.51
    reverse_proxy_hosts:
      hosts:
        proxy-01:
          ansible_host: 192.0.2.60
    pocket_cli_hosts:
      hosts:
        provider-01:
